<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/yuilib.css">
    <script src="./tools/yuilib.js"></script>
    <title>Document</title>
</head>
<body>
    <div style="display: flex; flex-direction: column; gap: 1rem;">

        <!-- Button -->
        <button class="y-btn">
            Write A Description
        </button>

        <!-- Input -->
        <input type="text" placeholder="Write A Description" class="y-input">

        <!-- Spinner -->
        <div class="y-spinner"></div>

        <!-- Card -->
        <div class="y-card">
            <h3 class="y-card-title">Title Card</h3>
            <p class="y-card-content">Example text description, lorem iphe delphis.</p>
            <button class="y-btn">Action</button>
        </div>

        <!-- Select -->
        <div class="y-select-wrapper">
            <input type="hidden" name="seletor" value="">
            
            <div class="y-select" tabindex="0">
                <span class="y-selected">Option a select</span>
            </div>

            <div class="y-option-container">
                <span class="y-option" data-value="1">Option one</span>
                <span class="y-option" data-value="2">Option two</span>
                <span class="y-option" data-value="3">Option Three</span>
            </div>
        </div>

        <!-- Sidebar -->
        <div style="display: flex; width: 100px;">
            <button class="y-sidebar-open-btn" onclick="openSidebar()">☰</button>
        </div>
        <div class="y-sidebar closed" id="mySidebar">
            <div class="y-sidebar-header">
                Menu
                <button class="y-sidebar-close-btn" onclick="closeSidebar()">×</button>
            </div>

            <nav class="y-sidebar-nav">
                <ul>
                <li><a href="#">Dashboard</a></li>
                <li><a href="#">Relatórios</a></li>
                <li><a href="#">Usuários</a></li>
                <li><a href="#" class="active">Configurações</a></li>
                </ul>
            </nav>

            <div class="y-sidebar-footer">
                &copy; 2025 Black Hunter
            </div>
        </div>

        <!-- Modal -->
        <button class="y-btn" onclick="openModal('modal-test')">Open Modal</button>
        <div class="y-modal-backdrop" id="modal-test">
            <div class="y-modal">
                <header>
                    Modal Title
                    <button class="y-modal-close-btn" onclick="closeModal('modal-test')">×</button>
                </header>
                <hr>
                <div class="y-modal-content" style="display: flex; flex-direction: column; gap: 1rem;">
                    <input type="text" placeholder="Write A Description" class="y-input">
                    <input type="text" placeholder="Write A Description" class="y-input">
                    <input type="text" placeholder="Write A Description" class="y-input">
                </div>
                <hr>
                <footer>
                    <button class="y-btn">
                        Submit
                    </button>
                </footer>
            </div>
        </div>
    </div>
</body>
</html>
